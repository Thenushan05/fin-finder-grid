<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hullGradientOFRP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cc4400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#992200;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="interiorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eeeeee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cccccc;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="5" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Water Reflection Hint -->
  <ellipse cx="400" cy="420" rx="200" ry="20" fill="#000000" opacity="0.2" filter="url(#dropShadow)" />

  <g transform="translate(150, 200) scale(0.75)" filter="url(#dropShadow)">
    <!-- Hull (3D Shape) -->
    <path d="M 0 100 Q 50 200 200 200 L 500 200 L 500 80 L 0 100 Z" fill="url(#hullGradientOFRP)" stroke="#661100" stroke-width="2" />
    
    <!-- Interior / Gunwale -->
    <path d="M 10 105 Q 60 120 200 120 L 490 120 L 490 85 L 10 105 Z" fill="url(#interiorGradient)" stroke="#999999" stroke-width="1" />

    <!-- Center Console -->
    <path d="M 250 120 L 250 40 L 320 40 L 320 120" fill="#ffffff" stroke="#999999" stroke-width="1" />
    <rect x="260" y="50" width="50" height="30" fill="#333333" /> <!-- Dashboard -->
    <circle cx="240" cy="60" r="15" fill="none" stroke="#333333" stroke-width="3" /> <!-- Steering Wheel -->

    <!-- Seats -->
    <rect x="350" y="110" width="60" height="10" fill="#ff6600" stroke="#cc4400" />

    <!-- Outboard Motor -->
    <g transform="translate(500, 80)">
      <path d="M 0 0 L 40 0 L 40 120 L 20 140 L 0 120 Z" fill="#333333" stroke="#000000" />
      <path d="M 5 10 L 35 10 L 35 40 L 5 40 Z" fill="#555555" /> <!-- Cowling -->
      <text x="10" y="30" font-family="Arial" font-size="10" fill="#ffffff" font-weight="bold">40</text>
    </g>

    <!-- Fuel Tank -->
    <rect x="400" y="130" width="50" height="30" fill="#cc0000" stroke="#990000" />
    <text x="405" y="150" font-family="Arial" font-size="8" fill="#ffffff">FUEL</text>
  </g>
</svg>
