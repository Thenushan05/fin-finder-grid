<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hullGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0055aa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#003377;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001133;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cabinGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dddddd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#112233;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#335577;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="5" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Water Reflection Hint -->
  <ellipse cx="400" cy="480" rx="300" ry="30" fill="#000000" opacity="0.2" filter="url(#dropShadow)" />

  <g transform="translate(50, 150) scale(0.9)" filter="url(#dropShadow)">
    <!-- Hull (3D Shape) -->
    <path d="M 0 150 Q 150 280 400 280 L 700 280 L 700 80 L 600 80 L 400 100 L 0 150 Z" fill="url(#hullGradient)" stroke="#002244" stroke-width="2" />
    
    <!-- Deck Line -->
    <path d="M 0 150 Q 150 120 400 100 L 600 80 L 700 80" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5" />

    <!-- Cabin Structure -->
    <path d="M 400 100 L 400 20 L 580 20 L 580 85" fill="url(#cabinGradient)" stroke="#999999" stroke-width="1" />
    <!-- Cabin Roof -->
    <path d="M 390 20 L 590 20 L 590 25 L 390 25 Z" fill="#eeeeee" stroke="#999999" stroke-width="1" />

    <!-- Windows -->
    <rect x="420" y="40" width="50" height="30" rx="5" fill="url(#windowGradient)" stroke="#ffffff" stroke-width="2" />
    <rect x="490" y="40" width="50" height="30" rx="5" fill="url(#windowGradient)" stroke="#ffffff" stroke-width="2" />

    <!-- Mast -->
    <rect x="480" y="-80" width="10" height="100" fill="#dddddd" stroke="#999999" />
    <line x1="485" y1="-80" x2="485" y2="-120" stroke="#999999" stroke-width="2" />
    <!-- Radar Dome -->
    <rect x="470" y="-100" width="30" height="10" rx="5" fill="#ffffff" stroke="#999999" />

    <!-- RSW Hold Hatch -->
    <path d="M 250 140 L 350 130 L 360 160 L 260 170 Z" fill="#cccccc" stroke="#666666" opacity="0.8" />
    <text x="280" y="155" font-family="Arial" font-size="10" fill="#333333" font-weight="bold">RSW</text>

    <!-- Propeller -->
    <g transform="translate(680, 280)">
      <circle cx="0" cy="0" r="5" fill="#aa8800" />
      <path d="M 0 0 L 15 10 L 5 20 Z" fill="#ccaa00" stroke="#886600" />
      <path d="M 0 0 L -15 10 L -5 20 Z" fill="#ccaa00" stroke="#886600" />
      <path d="M 0 0 L 0 -20 L 5 -10 Z" fill="#ccaa00" stroke="#886600" />
    </g>
  </g>
</svg>
