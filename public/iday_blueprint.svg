<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hullGradientIDAY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00aa88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#007755;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004433;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cabinGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dddddd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#112233;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#335577;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="5" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Water Reflection Hint -->
  <ellipse cx="400" cy="450" rx="250" ry="25" fill="#000000" opacity="0.2" filter="url(#dropShadow)" />

  <g transform="translate(100, 180) scale(0.85)" filter="url(#dropShadow)">
    <!-- Hull (3D Shape) -->
    <path d="M 0 150 Q 100 250 350 250 L 600 250 L 600 100 L 500 100 L 350 110 L 0 150 Z" fill="url(#hullGradientIDAY)" stroke="#003322" stroke-width="2" />
    
    <!-- Deck Line -->
    <path d="M 0 150 Q 100 130 350 110 L 500 100 L 600 100" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5" />

    <!-- Cabin Structure (Lower Profile) -->
    <path d="M 350 110 L 350 50 L 480 50 L 480 100" fill="url(#cabinGradient)" stroke="#999999" stroke-width="1" />
    <!-- Cabin Roof -->
    <path d="M 340 50 L 490 50 L 490 55 L 340 55 Z" fill="#eeeeee" stroke="#999999" stroke-width="1" />

    <!-- Windows -->
    <rect x="370" y="70" width="40" height="25" rx="3" fill="url(#windowGradient)" stroke="#ffffff" stroke-width="2" />

    <!-- Mast (Short) -->
    <rect x="420" y="0" width="8" height="50" fill="#dddddd" stroke="#999999" />
    
    <!-- Ice Box Hatch -->
    <path d="M 200 140 L 280 135 L 290 160 L 210 165 Z" fill="#eeeeee" stroke="#999999" />
    <text x="220" y="155" font-family="Arial" font-size="10" fill="#333333" font-weight="bold">ICE</text>

    <!-- Propeller -->
    <g transform="translate(580, 250)">
      <circle cx="0" cy="0" r="5" fill="#aa8800" />
      <path d="M 0 0 L 12 8 L 4 16 Z" fill="#ccaa00" stroke="#886600" />
      <path d="M 0 0 L -12 8 L -4 16 Z" fill="#ccaa00" stroke="#886600" />
      <path d="M 0 0 L 0 -16 L 4 -8 Z" fill="#ccaa00" stroke="#886600" />
    </g>
  </g>
</svg>
