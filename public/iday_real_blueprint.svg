<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint Background -->
  <rect width="100%" height="100%" fill="#003366" />
  
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Styles -->
  <style>
    .hull { fill: none; stroke: #ffffff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .detail { fill: none; stroke: #ffffff; stroke-width: 1; opacity: 0.8; }
    .hidden { fill: none; stroke: #ffffff; stroke-width: 1; stroke-dasharray: 5,5; opacity: 0.5; }
    .text { fill: #ffffff; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
    .dim { stroke: #ffffff; stroke-width: 0.5; opacity: 0.6; marker-end: url(#arrow); marker-start: url(#arrow); }
  </style>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>

  <!-- IDAY Drawing -->
  <g transform="translate(100, 200) scale(0.8)">
    <!-- Hull Profile -->
    <path class="hull" d="M 0 150 Q 100 250 350 250 L 600 250 L 600 100 L 500 100 L 350 110 L 0 150 Z" />
    
    <!-- Waterline -->
    <line x1="-20" y1="200" x2="620" y2="200" class="hidden" />
    <text x="630" y="205" class="text" font-size="10">DWL</text>

    <!-- Cabin (Low Profile) -->
    <path class="hull" d="M 350 110 L 350 50 L 480 50 L 480 100" />
    <rect x="370" y="70" width="40" height="25" class="detail" />
    
    <!-- Mast -->
    <line x1="420" y1="50" x2="420" y2="0" class="hull" />
    <line x1="420" y1="0" x2="550" y2="100" class="detail" />

    <!-- Ice Box -->
    <rect x="200" y="150" width="100" height="60" class="hidden" />
    <text x="210" y="180" class="text">ICE BOX</text>

    <!-- Engine -->
    <rect x="400" y="160" width="80" height="50" class="hidden" />
    <text x="410" y="190" class="text">ENG</text>

    <!-- Propeller -->
    <circle cx="580" cy="250" r="15" class="hidden" />
    <path class="hull" d="M 580 250 L 590 260 M 580 250 L 570 260" />
  </g>

  <!-- Dimensions -->
  <line x1="100" y1="420" x2="580" y2="420" class="dim" />
  <text x="300" y="410" class="text">LOA: 10.50m</text>

  <!-- Title Block -->
  <g transform="translate(550, 480)">
    <rect width="230" height="100" fill="none" stroke="#ffffff" stroke-width="2" />
    <line x1="0" y1="30" x2="230" y2="30" stroke="#ffffff" />
    <line x1="0" y1="60" x2="230" y2="60" stroke="#ffffff" />
    <text x="10" y="20" class="text" font-size="18">VESSEL: IDAY-42</text>
    <text x="10" y="50" class="text">TYPE: COASTAL</text>
    <text x="10" y="85" class="text">SCALE: 1:50</text>
  </g>
</svg>
