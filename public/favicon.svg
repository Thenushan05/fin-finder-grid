<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#oceanGradient)" stroke="#fff" stroke-width="2"/>
  
  <!-- Fish body -->
  <ellipse cx="45" cy="50" rx="20" ry="12" fill="#fff" opacity="0.9"/>
  
  <!-- Fish tail -->
  <path d="M 25 50 L 15 42 L 15 58 Z" fill="#fff" opacity="0.9"/>
  
  <!-- Fish eye -->
  <circle cx="52" cy="48" r="2" fill="#1e40af"/>
  
  <!-- Location pin -->
  <path d="M 70 35 C 70 30 65 25 60 25 C 55 25 50 30 50 35 C 50 42 60 52 60 52 C 60 52 70 42 70 35 Z" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
  <circle cx="60" cy="35" r="3" fill="#fff"/>
  
  <!-- Wave accent -->
  <path d="M 10 75 Q 25 70 40 75 T 70 75 T 90 75" stroke="#fff" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
